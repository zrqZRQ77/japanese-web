<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日语生词速查</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+SC:wght@600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F3EF;--sur:#fff;--sur2:#EDECE7;
  --bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.2);
  --tx:#1A1814;--mu:#6B6760;--hi:#A09C96;
  --ac:#534AB7;--al:#EEEDFE;--am:#AFA9EC;--ad:#3C3489;
  --ok:#1D9E75;--r:10px;--rl:14px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:780px;margin:0 auto}
header{display:flex;align-items:center;gap:14px;margin-bottom:1.75rem}
.logo{width:44px;height:44px;background:var(--ac);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Noto Serif SC',serif;font-size:20px;font-weight:600;flex-shrink:0}
.htx h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
.htx p{font-size:13px;color:var(--mu);margin-top:2px}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.ir{display:flex;gap:8px;margin-bottom:.875rem}
textarea{flex:1;min-height:80px;resize:vertical;font-size:16px;font-family:inherit;border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;background:var(--sur2);color:var(--tx);line-height:1.6;transition:border-color .15s,box-shadow .15s}
textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--al);background:var(--sur)}
textarea::placeholder{color:var(--hi)}
.btn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 18px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx);font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;align-self:flex-start;transition:background .12s,transform .1s}
.btn:hover{background:var(--sur2)}.btn:active{transform:scale(.97)}
.btnp{background:var(--ac);color:#fff;border-color:var(--ac)}.btnp:hover{background:var(--ad)}
.exs{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.exl{font-size:12px;color:var(--hi)}
.chip{font-size:12px;color:var(--ac);border:1px solid var(--am);border-radius:20px;padding:3px 10px;cursor:pointer;background:var(--al);font-family:inherit;transition:background .12s}
.chip:hover{background:#CECBF6}
.banner{background:var(--al);border:1px solid var(--am);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--ad);display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.spinner{width:14px;height:14px;border:2px solid var(--am);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.res{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:1.5rem;margin-bottom:.5rem;min-height:90px;line-height:3.2;font-size:19px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 0;color:var(--hi);font-size:14px;gap:8px;text-align:center;line-height:1.7}
.eico{font-size:36px;opacity:.3}
ruby{ruby-align:center}
rt{font-size:11px;color:var(--mu)}
.tok{display:inline;cursor:pointer;border-radius:4px;padding:0 2px;transition:background .1s,color .1s}
.tok:hover,.tok.on{background:var(--al);color:var(--ad)}
.tok.has{border-bottom:1.5px dotted var(--am)}
.sb{font-size:12px;color:var(--hi);padding:4px 0 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0}
.vs{margin-top:.25rem}
.vh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.vt{font-size:13px;color:var(--mu);display:flex;align-items:center;gap:8px}
.vbg{background:var(--al);color:var(--ac);border-radius:20px;padding:1px 8px;font-size:12px;font-weight:500}
.vgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.vc{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;transition:border-color .15s,transform .1s}
.vc:hover{border-color:var(--am);transform:translateY(-1px)}
.vcw{font-size:17px;font-weight:700}
.vcr{font-size:12px;color:var(--ac);margin-top:1px}
.vcp{display:inline-block;font-size:10px;background:var(--sur2);color:var(--mu);border-radius:4px;padding:1px 5px;margin-top:4px}
.vcc{font-size:14px;color:var(--tx);margin-top:4px;font-weight:500}
.vce{font-size:12px;color:var(--mu);margin-top:2px;line-height:1.4}
.tt{position:fixed;z-index:9999;background:var(--sur);border:1px solid var(--bd2);border-radius:var(--rl);padding:14px 16px;width:272px;pointer-events:none;display:none;box-shadow:0 8px 32px rgba(0,0,0,.13)}
.tt.on{display:block}
.ttw{font-size:23px;font-weight:700}
.ttr{font-size:14px;color:var(--ac);margin-top:2px}
.ttp{display:inline-block;font-size:11px;background:var(--al);color:var(--ac);border-radius:4px;padding:2px 7px;margin-top:6px}
.ttd{border:none;border-top:1px solid var(--bd);margin:10px 0}
.ttcn{font-size:17px;color:var(--ac);font-weight:600;margin-bottom:4px}
.tten{font-size:14px;color:var(--tx);line-height:1.5}
.ttnf{font-size:13px;color:var(--hi)}
.ttld{font-size:13px;color:var(--mu);display:flex;align-items:center;gap:8px}
@media(max-width:560px){.vgr{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.res{font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">日</div>
    <div class="htx">
      <h1>日语生词速查</h1>
      <p>自动分词 · 标注假名 · 悬停查中英文释义</p>
    </div>
  </header>

  <div id="banner" class="banner">
    <div class="spinner"></div>
    分词引擎加载中，首次约需 10-20 秒，请稍候…
  </div>

  <div class="card">
    <div class="ir">
      <textarea id="inp" placeholder="在此粘贴或输入日语句子…&#10;例：私は毎日日本語を勉強しています。"></textarea>
      <button class="btn btnp" onclick="analyze()">▶ 分析</button>
    </div>
    <div class="exs">
      <span class="exl">例句：</span>
      <span class="chip" onclick="loadEx(this)">私は毎日日本語を勉強しています。</span>
      <span class="chip" onclick="loadEx(this)">東京は世界で最も人口の多い都市です。</span>
      <span class="chip" onclick="loadEx(this)">桜の花が咲いている季節が一番好きです。</span>
      <span class="chip" onclick="loadEx(this)">この映画はとても面白かったです。</span>
      <span class="chip" onclick="loadEx(this)">友達と一緒に旅行する計画を立てています。</span>
    </div>
  </div>

  <div class="res" id="res">
    <div class="empty">
      <div class="eico">✍</div>
      <span>引擎加载完成后输入句子点击「分析」<br>汉字自动标注假名，悬停词汇查中英文释义</span>
    </div>
  </div>

  <div id="sb" class="sb" style="display:none"></div>

  <div class="vs" id="vs" style="display:none">
    <div class="vh">
      <div class="vt">词汇卡片 <span class="vbg" id="vcnt"></span></div>
      <button class="btn" style="height:30px;font-size:12px;padding:0 10px" onclick="clearV()">✕ 清空</button>
    </div>
    <div class="vgr" id="vgr"></div>
  </div>
</div>

<div class="tt" id="tt">
  <div class="ttw" id="ttw"></div>
  <div class="ttr" id="ttr"></div>
  <div id="ttp2"></div>
  <hr class="ttd">
  <div id="ttb"></div>
</div>

    banner.style.display='none';
  });

function k2h(s){return(s||'').replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}

function lookup(word, base){
  if(DICT[word]) return DICT[word];
  if(base && base!=='*' && DICT[base]) return DICT[base];
  return null;
}

function loadEx(el){document.getElementById('inp').value=el.textContent; analyze();}

function analyze(){
  const text=document.getElementById('inp').value.trim();
  if(!text) return;
  if(!tokenizer){
    alert('分词引擎还在加载中，请稍候再试');
    return;
  }
  const area=document.getElementById('res');
  area.innerHTML='';
  vmap={};
  const frag=document.createDocumentFragment();
  const tokens=tokenizer.tokenize(text);

  tokens.forEach(tok=>{
    const surf=tok.surface_form;
    const rd=tok.reading;
    const pos=(tok.part_of_speech||'').split(',')[0];
    const base=tok.basic_form||surf;
    const hasKanji=/[\u4E00-\u9FFF\u3400-\u4DBF]/.test(surf);
    const isPunct=/^[。、！？「」『』【】…・\s\n]+$/.test(surf);
    const isWord=pos&&!['記号','空白','BOS/EOS'].includes(pos)&&!isPunct&&surf.length>0;

    const span=document.createElement('span');

    if(hasKanji && rd && rd!==surf && rd!=='*'){
      const ruby=document.createElement('ruby');
      ruby.textContent=surf;
      const rt=document.createElement('rt');
      rt.textContent=k2h(rd);
      ruby.appendChild(rt);
      span.appendChild(ruby);
    } else {
      span.textContent=surf;
    }

    if(isWord){
      const entry=lookup(surf,base);
      span.className='tok'+(entry?' has':'');
      span.dataset.surf=surf;
      span.dataset.rd=rd||surf;
      span.dataset.pos=pos;
      span.dataset.base=base;
      span.addEventListener('mouseenter',onHover);
      span.addEventListener('mouseleave',hideT);
      span.addEventListener('mousemove',moveT);
      const notTrivial=surf.length>=2&&!/^[ぁ-ん]{1,2}$/.test(surf)&&!/^[ァ-ン]{1,2}$/.test(surf);
      if(notTrivial&&!vmap[surf]) vmap[surf]={rd,pos,base,entry};
    }
    frag.appendChild(span);
  });

  area.appendChild(frag);
  const withEntry=Object.values(vmap).filter(v=>v.entry).length;
  const sb=document.getElementById('sb');
  sb.style.display='flex';
  sb.innerHTML=`<div class="dot"></div>分析完成，共 ${tokens.length} 个词元，`+
    `<span style="color:var(--ac);font-weight:500">${withEntry} 个有释义</span>（虚线下划线词可悬停查询）`;
  renderV();
}

function renderV(){
  const keys=Object.keys(vmap).filter(k=>vmap[k].entry);
  const sec=document.getElementById('vs');
  const grid=document.getElementById('vgr');
  if(!keys.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('vcnt').textContent=keys.length+' 词';
  grid.innerHTML='';
  keys.forEach(w=>{
    const e=vmap[w].entry;
    const card=document.createElement('div');
    card.className='vc';
    const posZH=e.p?PM[PE[e.p]||e.p]||e.p:'';
    card.innerHTML=`<div class="vcw">${w}</div>`+
      (posZH?`<span class="vcp">${posZH}</span>`:'')+
      `<div class="vcc">${e.c}</div><div class="vce">${e.e}</div>`;
    grid.appendChild(card);
  });
}

function clearV(){vmap={};document.getElementById('vs').style.display='none';}

function onHover(ev){
  if(active) active.classList.remove('on');
  active=ev.currentTarget;
  active.classList.add('on');
  const surf=active.dataset.surf;
  const rd=active.dataset.rd;
  const pos=active.dataset.pos;
  const base=active.dataset.base;
  const entry=lookup(surf,base);
  document.getElementById('ttw').textContent=surf;
  const h=k2h(rd);
  document.getElementById('ttr').textContent=(h&&h!==surf)?h:'';
  const ppe=document.getElementById('ttp2');
  const body=document.getElementById('ttb');
  if(entry){
    const posZH=entry.p?PM[PE[entry.p]||entry.p]||entry.p:'';
    ppe.innerHTML=posZH?`<span class="ttp">${posZH}</span>`:'';
    body.innerHTML=`<div class="ttcn">${entry.c}</div><div class="tten">${entry.e}</div>`;
  } else if(pos){
    const posZH=PM[pos]||pos;
    ppe.innerHTML=posZH?`<span class="ttp">${posZH}</span>`:'';
    body.innerHTML=`<div class="ttnf">词典未收录此词</div>`;
  } else {
    ppe.innerHTML='';
    body.innerHTML=`<div class="ttnf">词典未收录此词</div>`;
  }
  const tt=document.getElementById('tt');
  placeT(ev,tt);
  tt.classList.add('on');
}
function moveT(ev){placeT(ev,document.getElementById('tt'));}
function placeT(ev,tt){
  const m=14,w=276,h=160;
  let x=ev.clientX+m,y=ev.clientY+m;
  if(x+w>window.innerWidth-8) x=ev.clientX-w-m;
  if(y+h>window.innerHeight-8) y=ev.clientY-h-m;
  tt.style.left=Math.max(4,x)+'px';
  tt.style.top=Math.max(4,y)+'px';
}
function hideT(){
  document.getElementById('tt').classList.remove('on');
  if(active){active.classList.remove('on');active=null;}
}
document.addEventListener('click',e=>{if(!e.target.classList.contains('tok'))hideT();});
</script>
